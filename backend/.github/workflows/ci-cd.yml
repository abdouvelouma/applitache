name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Job 1: Vérifier le linting
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Utiliser Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Installer les dépendances
        run: npm ci
      
      - name: Exécuter ESLint
        run: npm run lint
        continue-on-error: true

  # Job 2: Exécuter les tests
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: task_manager_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Utiliser Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Installer les dépendances
        run: npm ci
      
      - name: Exécuter les tests
        run: npm test
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USERNAME: root
          DB_PASSWORD: root
          DB_DATABASE: task_manager_test
          JWT_SECRET: test_secret_key_12345
      
      - name: Générer le rapport de couverture
        run: npm run test:coverage
        continue-on-error: true
      
      - name: Uploader la couverture vers Codecov
        uses: codecov/codecov-action@v3
        continue-on-error: true

  # Job 3: Construire l'image Docker
  build-docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Utiliser Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Construire l'image Docker
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: task-manager-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

