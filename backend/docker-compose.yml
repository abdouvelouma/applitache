# Docker Compose pour task-manager-api
# Démarrage: docker-compose up -d
# Arrêt: docker-compose down
version: '3.9'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: task-manager-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: task_user
      MYSQL_PASSWORD: task_secure_password_123
      MYSQL_DATABASE: task_manager_db
      MYSQL_ROOT_HOST: '%'  # Permet les connexions à distance
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - task-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      timeout: 20s
      retries: 10
      interval: 5s
    restart: unless-stopped

  # Node.js Application
  api:
    build: .
    container_name: task-manager-api
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: task_user
      DB_PASSWORD: task_secure_password_123
      DB_DATABASE: task_manager_db
      JWT_SECRET: your_super_secret_jwt_key_change_in_production_12345
      JWT_EXPIRES_IN: 7d
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - task-network
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    command: npm start

volumes:
  mysql_data:
    driver: local

networks:
  task-network:
    driver: bridge
